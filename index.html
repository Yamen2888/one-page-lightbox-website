<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>One-Page Lightbox Gallery</title
<link href="https://jsdelivr.net" rel="stylesheet">
<style>
body { background-color: #f8f9fa; padding-top: 40px; }
.gallery-img { cursor: pointer; transition: transform 0.2s; max-height: 250px; object-fit: cover; width: 100%; border-radius: 8px; }
.gallery-img:hover { transform: scale(1.05); }
</style>
</head>
<body>
<div class="col-md-4 col-sm-6">
<img src="https://unsplash.com" class="img-fluid gallery-img" alt="Beautiful Mountains" data-bs-toggle="modal" data-bs-target="#lightboxModal" onclick="changeImage(this.src, 'Beautiful Mountains')">
</div>                                  
<div class="col-md-4 col-sm-6">
<img src="https://unsplash.com" class="img-fluid gallery-img" alt="Green Nature" data-bs-toggle="modal" data-bs-target="#lightboxModal" onclick="changeImage(this.src, 'Green Nature')">
</div>
<div class="col-md-4 col-sm-6">
<img src="https://unsplash.com" class="img-fluid gallery-img" alt="Forest Path" data-bs-toggle="modal" data-bs-target="#lightboxModal" onclick="changeImage(this.src, 'Forest Path')">
</div>
</div>
</div>
